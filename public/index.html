<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Typeahead</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1 class="logo">Search<span>Typeahead</span></h1>

    <!-- Search bar + dropdown ek wrapper me taaki dropdown bar se visually attached lage. -->
    <div class="search-area">
      <form id="search-form" class="search-bar" autocomplete="off" role="search">
        <input
          id="search-input"
          type="text"
          placeholder="Search anything…"
          aria-label="Search"
          aria-autocomplete="list"
          aria-controls="suggestions"
          aria-expanded="false"
        />
        <!-- Subtle loading indicator; default hidden, fetch ke time dikhta hai. -->
        <span id="spinner" class="spinner" hidden></span>
        <button type="submit" id="search-btn" class="search-btn">Search</button>
      </form>

      <!-- Live suggestion dropdown — JS isme rows render karega. -->
      <ul id="suggestions" class="suggestions" role="listbox" hidden></ul>
    </div>

    <!-- Phase 5: recency-aware ranking toggle (default ON -> mode=trending). -->
    <label class="toggle">
      <input type="checkbox" id="recency-toggle" checked />
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      <span class="toggle-label">Recency-aware ranking</span>
    </label>

    <!-- Inline error state (network/500); default hidden. -->
    <p id="error" class="error" hidden>Couldn't load suggestions</p>

    <!-- Phase 3: POST /search ka dummy response yaha dikhega. Default hidden. -->
    <div id="response" class="response" hidden></div>

    <!-- Phase 5: trending searches yaha render honge. Abhi sirf empty container. -->
    <section id="trending" class="trending">
      <h2>Trending</h2>
      <ul id="trending-list" class="trending-list">
        <!-- empty for now -->
      </ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
